<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <meta name="description" content="Foodie - Premium food ordering. Fresh ingredients, expert chefs, delivered to your doorstep." />
    <link rel="icon" type="image/svg+xml" href="/images/logo-icon.svg" />
    <title>Foodie — Delicious Food Delivered</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  </head>
  <body>
    <!-- Preloader -->
    <div id="preloader" class="preloader">
      <div class="loader-circle"></div>
      <div class="loader-icon">🍔</div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Hide preloader natively to prevent flash while React mounts -->
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const preloader = document.getElementById('preloader');
          if (preloader) {
            preloader.classList.add('hidden');
            setTimeout(() => preloader.remove(), 500);
          }
        }, 1000);
      });
    </script>
  </body>
</html>
